#:schema https://json.schemastore.org/air.json

# ============================================================================
# THIS IS FOR LOCAL DEVELOPMENT ONLY
# ============================================================================

root = "."
testdata_dir = "testdata"
tmp_dir = "_tmp_"

[build]
args_bin = []
cmd = "go build -o ./_tmp_/app ./cmd/api"
entrypoint = "./_tmp_/app"
delay = 1000
exclude_dir = ["assets", "_tmp_", "vendor", "_BUILD_", "api", "tmp"]
exclude_file = []
exclude_regex = ["_test.go"]
exclude_unchanged = false
follow_symlink = false
full_bin = ""
include_dir = []
include_ext = ["go", "tpl", "tmpl", "html"]
include_file = []
kill_delay = "0s"
log = "build-errors.log"
poll = true
poll_interval = 1000
rerun = false
rerun_delay = 500
send_interrupt = false
stop_on_error = false

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
main_only = false
time = false

[misc]
clean_on_exit = false

[screen]
clear_on_rebuild = false
keep_scroll = true
