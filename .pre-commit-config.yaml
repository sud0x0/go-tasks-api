repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # Conventional Commits enforcement. GoReleaser groups the changelog by the
  # type prefix (feat:/fix:/perf:/...), so subject lines must follow the spec.
  # NOTE: requires `pre-commit install --hook-type commit-msg` once per clone —
  # the default `pre-commit install` only wires the pre-commit hook.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # Secrets detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # Go formatting and linting
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt -l -w
        language: system
        files: \.go$

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run
        language: system
        files: \.go$
        pass_filenames: false

      - id: govulncheck
        name: govulncheck
        entry: govulncheck ./...
        language: system
        files: go\.(mod|sum)$
        pass_filenames: false

  # Semgrep security scan
  - repo: https://github.com/semgrep/pre-commit
    rev: v1.156.0
    hooks:
      - id: semgrep
        args:
          - --config=auto
          - --error
          - --skip-unknown-extensions
