name: release

on:
  push:
    tags:
      - 'v*'

# Default to read-only at the workflow level. Each job widens permissions
# only for what it needs.
permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # publish GitHub Releases
      id-token: write   # OIDC for SLSA provenance signing
    outputs:
      hashes: ${{ steps.subjects.outputs.hashes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so the changelog can compare against the previous tag

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Syft generates SPDX-JSON SBOMs per binary via GoReleaser's `sboms:` block.
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.22.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # SLSA generic generator subject format: lines of "<sha256>  <filename>",
      # base64-encoded as a single string. GoReleaser writes two `Binary`
      # entries per platform: the raw build output (no `extra.Checksum`) and
      # the uploaded artifact (with `extra.Checksum: "sha256:<hex>"`). We
      # filter for the latter — only uploaded artifacts get attestations.
      - name: Compute binary provenance subjects
        id: subjects
        run: |
          HASHES=$(jq -r '.[] | select(.type=="Binary" and .extra.Checksum != null) | "\(.extra.Checksum | sub("^sha256:"; ""))  \(.name)"' dist/artifacts.json | base64 -w0)
          if [ -z "$HASHES" ]; then
            echo "::error::no Binary subjects found in dist/artifacts.json"
            exit 1
          fi
          echo "hashes=$HASHES" >> "$GITHUB_OUTPUT"

  # SLSA Level 3 build provenance for the released binaries. Attaches a
  # `<release>.intoto.jsonl` file to the GitHub Release. Verify with:
  #   slsa-verifier verify-artifact <binary> --provenance-path <intoto> ...
  binary-provenance:
    needs: [goreleaser]
    permissions:
      actions: read       # read workflow run metadata
      id-token: write     # OIDC for the SLSA generator's signer
      contents: write     # upload the provenance file to the release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.goreleaser.outputs.hashes }}
      upload-assets: true
