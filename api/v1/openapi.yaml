openapi: 3.0.3
info:
  title: Go Tasks API
  description: |
    Task and habit management API. Users register and manage their own tasks,
    categories, daily logs, and answers. All data is scoped to the authenticated user.

    ## Authentication

    Protected endpoints require a valid JWT access token in the `Authorization` header
    using the Bearer scheme. Access tokens are RS256-signed and valid for 15 minutes.

    **Token Claims:**
    - `sub` — user ID (UUID)
    - `iss` — issuer (configured via JWT_ISSUER)
    - `aud` — audience (configured via JWT_AUDIENCE)
    - `exp` — expiration time
    - `nbf` — not before time
    - `iat` — issued at time
    - `jti` — unique token ID (UUID)

    ## Refresh Tokens

    Refresh tokens are valid for 1 hour and support rotation. On use, the old token
    is deleted and a new one is issued. Logout revokes the refresh token and adds
    the access token's jti to a blocklist.

  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Development server

security:
  - BearerAuth: []

tags:
  - name: Health
    description: Health check endpoints
  - name: Metrics
    description: Prometheus metrics endpoint
  - name: Auth
    description: Authentication endpoints
  - name: Category
    description: Task category management
  - name: Task
    description: Task management
  - name: Occurrence
    description: Task occurrence management
  - name: DailyLog
    description: Daily journal entries

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy

  /metrics:
    get:
      tags:
        - Metrics
      summary: Prometheus metrics
      description: |
        Exposes application metrics in Prometheus text format for scraping.

        **WARNING:** This endpoint has no authentication. In production, restrict access
        via network policy, reverse proxy, or move to a separate internal port.
      operationId: getMetrics
      security: []
      responses:
        "200":
          description: Prometheus metrics in text format
          content:
            text/plain:
              schema:
                type: string

  # Auth endpoints
  /api/v1/auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Username already exists

  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: Login and get tokens
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials

  /api/v1/auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token
      description: |
        Rotates refresh token and issues new access token.
        Send the refresh token in the `X-Refresh-Token` header.
      operationId: refreshToken
      security: []
      parameters:
        - name: X-Refresh-Token
          in: header
          required: true
          description: Current refresh token
          schema:
            type: string
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          description: Invalid or expired refresh token

  /api/v1/auth/logout:
    post:
      tags:
        - Auth
      summary: Logout and revoke tokens
      description: |
        Revokes refresh token and blocklists access token JTI.
        Send refresh token in `X-Refresh-Token` header and access token in `Authorization` header.
        If no refresh token is provided, returns 204 (no-op).
      operationId: logout
      parameters:
        - name: X-Refresh-Token
          in: header
          required: false
          description: Refresh token to revoke
          schema:
            type: string
      responses:
        "204":
          description: Logged out successfully
        "401":
          description: Token ownership mismatch

  # Category endpoints
  /api/v1/categories:
    get:
      tags:
        - Category
      summary: List categories
      operationId: listCategories
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags:
        - Category
      summary: Create a category
      operationId: createCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryRequest"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Category with this name already exists (case-insensitive)

  /api/v1/categories/{id}:
    get:
      tags:
        - Category
      summary: Get a category
      operationId: getCategory
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags:
        - Category
      summary: Update a category
      operationId: updateCategory
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryRequest"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Category with this name already exists (case-insensitive)

    delete:
      tags:
        - Category
      summary: Soft delete a category
      description: |
        Sets is_active to false. Returns 409 if already inactive or if the
        category has active tasks (deactivate tasks first).
      operationId: deleteCategory
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Category deactivated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Category is already inactive or has active tasks

  /api/v1/categories/{id}/permanent:
    delete:
      tags:
        - Category
      summary: Permanently delete a category
      description: Hard deletes an inactive category. Returns 409 if still active.
      operationId: permanentDeleteCategory
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Category permanently deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Cannot permanently delete an active category

  /api/v1/categories/{id}/reactivate:
    post:
      tags:
        - Category
      summary: Reactivate a category
      description: Sets is_active to true. Returns 409 if already active or name collision.
      operationId: reactivateCategory
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Category reactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Category is already active or another active category has this name

  /api/v1/categories/inactive:
    get:
      tags:
        - Category
      summary: List inactive categories
      operationId: listInactiveCategories
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: List of inactive categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/categories/bulk-delete:
    post:
      tags:
        - Category
      summary: Bulk soft delete categories
      description: Soft deletes multiple categories. Inactive IDs are ignored.
      operationId: bulkDeleteCategories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteRequest"
      responses:
        "200":
          description: Bulk delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkDeleteResponse"
        "400":
          description: Invalid request (empty list, too many IDs, invalid UUID)
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/categories/bulk-permanent-delete:
    post:
      tags:
        - Category
      summary: Bulk permanently delete categories
      description: Hard deletes multiple inactive categories. Active IDs are ignored.
      operationId: bulkPermanentDeleteCategories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteRequest"
      responses:
        "200":
          description: Bulk permanent delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkPermanentDeleteResponse"
        "400":
          description: Invalid request (empty list, too many IDs, invalid UUID)
        "401":
          $ref: "#/components/responses/Unauthorized"

  # Task endpoints
  /api/v1/tasks:
    get:
      tags:
        - Task
      summary: List tasks
      operationId: listTasks
      parameters:
        - name: category_id
          in: query
          description: Filter by category ID
          schema:
            type: string
            format: uuid
        - name: active
          in: query
          description: Filter by active status (default true)
          schema:
            type: boolean
            default: true
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags:
        - Task
      summary: Create a task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskWithDetails"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Category not found

  /api/v1/tasks/{id}:
    get:
      tags:
        - Task
      summary: Get a task with details
      operationId: getTask
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Task with schedule and options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskWithDetails"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags:
        - Task
      summary: Update a task
      operationId: updateTask
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags:
        - Task
      summary: Soft delete a task
      description: Sets is_active to false. Returns 409 if already inactive.
      operationId: deleteTask
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Task deactivated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Task is already inactive

  /api/v1/tasks/{id}/permanent:
    delete:
      tags:
        - Task
      summary: Permanently delete a task
      description: Hard deletes an inactive task and all its related data. Returns 409 if still active.
      operationId: permanentDeleteTask
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Task permanently deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Cannot permanently delete an active task

  /api/v1/tasks/{id}/reactivate:
    post:
      tags:
        - Task
      summary: Reactivate a task
      description: Sets is_active to true. Returns 409 if already active.
      operationId: reactivateTask
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Task reactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Task is already active

  /api/v1/tasks/bulk-delete:
    post:
      tags:
        - Task
      summary: Bulk soft delete tasks
      description: Soft deletes multiple tasks. Inactive IDs are ignored.
      operationId: bulkDeleteTasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteRequest"
      responses:
        "200":
          description: Bulk delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkDeleteResponse"
        "400":
          description: Invalid request (empty list, too many IDs, invalid UUID)
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/tasks/bulk-permanent-delete:
    post:
      tags:
        - Task
      summary: Bulk permanently delete tasks
      description: Hard deletes multiple inactive tasks. Active IDs are ignored.
      operationId: bulkPermanentDeleteTasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteRequest"
      responses:
        "200":
          description: Bulk permanent delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkPermanentDeleteResponse"
        "400":
          description: Invalid request (empty list, too many IDs, invalid UUID)
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/tasks/inactive:
    get:
      tags:
        - Task
      summary: List inactive tasks
      description: Lists all soft-deleted tasks regardless of category status.
      operationId: listInactiveTasks
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: List of inactive tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # Occurrence endpoints
  /api/v1/occurrences:
    get:
      tags:
        - Occurrence
      summary: List occurrences
      description: |
        Returns task occurrences for a given date or date range. Occurrences are
        generated on demand based on task schedules.

        **Required:** Either `date` OR both `start_date` and `end_date` must be provided.
        Returns 400 if no date parameters are supplied.

        Suppressed occurrences are included in the response with `is_suppressed: true`
        so the UI can display them as skipped.
      operationId: listOccurrences
      parameters:
        - name: date
          in: query
          description: Single day query (YYYY-MM-DD). Required if start_date/end_date not provided.
          schema:
            type: string
            format: date
        - name: start_date
          in: query
          description: Range query start (YYYY-MM-DD). Required with end_date if date not provided.
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          description: Range query end (YYYY-MM-DD). Required with start_date if date not provided.
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of occurrences with details
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OccurrenceWithDetails"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/occurrences/{id}/suppress:
    post:
      tags:
        - Occurrence
      summary: Suppress an occurrence
      description: Marks this occurrence as suppressed (skipped) for this day only
      operationId: suppressOccurrence
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Occurrence suppressed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Occurrence already suppressed

  /api/v1/occurrences/{id}/unsuppress:
    post:
      tags:
        - Occurrence
      summary: Unsuppress an occurrence
      description: Removes suppression from an occurrence, making it active again
      operationId: unsuppressOccurrence
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Occurrence unsuppressed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Occurrence is not suppressed

  /api/v1/occurrences/{id}/answer:
    post:
      tags:
        - Occurrence
      summary: Submit an answer
      description: Submit or update the answer for an occurrence
      operationId: submitAnswer
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerRequest"
      responses:
        "200":
          description: Answer saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskAnswer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # Daily log endpoints
  /api/v1/daily-logs:
    get:
      tags:
        - DailyLog
      summary: List daily logs
      operationId: listDailyLogs
      parameters:
        - name: date
          in: query
          description: Single day query (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: start_date
          in: query
          description: Range query start (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          description: Range query end (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of daily logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyLog"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags:
        - DailyLog
      summary: Create a daily log
      operationId: createDailyLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDailyLogRequest"
      responses:
        "201":
          description: Daily log created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyLog"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Daily log already exists for this date

  /api/v1/daily-logs/inactive:
    get:
      tags:
        - DailyLog
      summary: List inactive daily logs
      operationId: listInactiveDailyLogs
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: List of inactive daily logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyLog"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/daily-logs/bulk-delete:
    post:
      tags:
        - DailyLog
      summary: Bulk soft delete daily logs
      description: |
        Soft deletes multiple daily logs by ID. Accepts 1-100 IDs.
        Duplicate IDs are deduplicated server-side.
        Inactive IDs are ignored.
      operationId: bulkDeleteDailyLogs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteRequest"
      responses:
        "200":
          description: Bulk delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkDeleteResponse"
        "400":
          description: Invalid request (empty list, too many IDs, invalid UUID)
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/daily-logs/bulk-permanent-delete:
    post:
      tags:
        - DailyLog
      summary: Bulk permanently delete daily logs
      description: |
        Hard deletes multiple inactive daily logs by ID. Accepts 1-100 IDs.
        Duplicate IDs are deduplicated server-side.
        Active IDs are ignored.
      operationId: bulkPermanentDeleteDailyLogs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteRequest"
      responses:
        "200":
          description: Bulk permanent delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkPermanentDeleteResponse"
        "400":
          description: Invalid request (empty list, too many IDs, invalid UUID)
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/daily-logs/{id}:
    put:
      tags:
        - DailyLog
      summary: Update a daily log
      operationId: updateDailyLog
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDailyLogRequest"
      responses:
        "200":
          description: Updated daily log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyLog"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags:
        - DailyLog
      summary: Soft delete a daily log
      description: Sets is_active to false. Returns 409 if already inactive.
      operationId: deleteDailyLog
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Daily log deactivated
        "400":
          description: Invalid ID format
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Daily log is already inactive

  /api/v1/daily-logs/{id}/permanent:
    delete:
      tags:
        - DailyLog
      summary: Permanently delete a daily log
      description: Hard deletes an inactive daily log. Returns 409 if still active.
      operationId: permanentDeleteDailyLog
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Daily log permanently deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Cannot permanently delete an active daily log

  /api/v1/daily-logs/{id}/reactivate:
    post:
      tags:
        - DailyLog
      summary: Reactivate a daily log
      description: Sets is_active to true. Returns 409 if already active.
      operationId: reactivateDailyLog
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Daily log reactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyLog"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Daily log is already active

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256-signed JWT access token

  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    Offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0

  schemas:
    # Auth schemas
    RegisterRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        password:
          type: string
          minLength: 8
          maxLength: 72

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time
          description: When the access token expires
        token_type:
          type: string
          example: Bearer

    RefreshResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time
          description: When the access token expires
        token_type:
          type: string
          example: Bearer

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # Category schemas
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
          description: Category name (unique per user among active categories, case-insensitive)
        description:
          type: string
          maxLength: 500
        colour:
          type: string
          pattern: "^#[0-9a-f]{6}$"
          description: Hex colour code (e.g., #ff0000). Stored in lower-case.
          example: "#808080"
        is_active:
          type: boolean
          description: Whether the category is active (false = soft deleted)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 100
          description: Category name (unique per user, case-insensitive, whitespace-trimmed)
        description:
          type: string
          maxLength: 500
        colour:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
          description: |
            Hex colour code (e.g., #FF0000 or #ff0000).
            Accepts both upper and lower case on input; stored as lower-case.
            If omitted on create, defaults to #808080.
            If omitted on update, keeps the existing colour.
          example: "#ff0000"

    # Task schemas
    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 1000
        answer_type:
          type: string
          enum: [string, integer, boolean, select]
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TaskSchedule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        recurrence_type:
          type: string
          enum: [once, daily, every_n_days, weekly, every_n_weeks, monthly_date, monthly_weekday, yearly]
        recurrence_interval:
          type: integer
        days_of_week:
          type: array
          items:
            type: integer
        month_day:
          type: integer
        month_week:
          type: integer
        month_weekday:
          type: integer
        month_of_year:
          type: integer
        scheduled_times:
          type: array
          items:
            type: string
        start_date:
          type: string
          format: date
        end_type:
          type: string
          enum: [never, on_date, after_n]
        end_date:
          type: string
          format: date
        end_after_n:
          type: integer
        created_at:
          type: string
          format: date-time

    TaskSelectOption:
      type: object
      properties:
        id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        value:
          type: string
          maxLength: 100
        position:
          type: integer
        created_at:
          type: string
          format: date-time

    TaskWithDetails:
      type: object
      properties:
        task:
          $ref: "#/components/schemas/Task"
        schedule:
          $ref: "#/components/schemas/TaskSchedule"
        select_options:
          type: array
          items:
            $ref: "#/components/schemas/TaskSelectOption"

    CreateTaskRequest:
      type: object
      required:
        - category_id
        - name
        - answer_type
        - schedule
      properties:
        category_id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 1000
        answer_type:
          type: string
          enum: [string, integer, boolean, select]
        schedule:
          $ref: "#/components/schemas/ScheduleRequest"
        select_options:
          type: array
          minItems: 2
          maxItems: 10
          items:
            type: object
            properties:
              value:
                type: string
                maxLength: 100

    ScheduleRequest:
      type: object
      required:
        - recurrence_type
        - start_date
      properties:
        recurrence_type:
          type: string
          enum: [once, daily, every_n_days, weekly, every_n_weeks, monthly_date, monthly_weekday, yearly]
        recurrence_interval:
          type: integer
          minimum: 1
        days_of_week:
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 6
        month_day:
          type: integer
          minimum: 1
          maximum: 31
        month_week:
          type: integer
          minimum: 1
          maximum: 5
        month_weekday:
          type: integer
          minimum: 0
          maximum: 6
        month_of_year:
          type: integer
          minimum: 1
          maximum: 12
        scheduled_times:
          type: array
          items:
            type: string
            pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
        start_date:
          type: string
          format: date
        end_type:
          type: string
          enum: [never, on_date, after_n]
        end_date:
          type: string
          format: date
        end_after_n:
          type: integer
          minimum: 1

    UpdateTaskRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 1000

    # Occurrence schemas
    TaskOccurrence:
      type: object
      properties:
        id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        schedule_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        occurrence_date:
          type: string
          format: date
        scheduled_time:
          type: string
          format: time
        is_suppressed:
          type: boolean
        created_at:
          type: string
          format: date-time

    TaskAnswer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        occurrence_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        answer_string:
          type: string
          maxLength: 500
        answer_integer:
          type: integer
        answer_boolean:
          type: boolean
        answer_select:
          type: string
          format: uuid
        answered_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OccurrenceWithDetails:
      type: object
      properties:
        occurrence:
          $ref: "#/components/schemas/TaskOccurrence"
        task:
          $ref: "#/components/schemas/Task"
        select_options:
          type: array
          items:
            $ref: "#/components/schemas/TaskSelectOption"
        answer:
          $ref: "#/components/schemas/TaskAnswer"

    AnswerRequest:
      type: object
      properties:
        answer_string:
          type: string
          maxLength: 500
        answer_integer:
          type: integer
        answer_boolean:
          type: boolean
        answer_select:
          type: string
          format: uuid

    # Daily log schemas
    DailyLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        log_date:
          type: string
          format: date
        entry:
          type: string
          maxLength: 10000
        is_active:
          type: boolean
          description: Whether the daily log is active (false = soft deleted)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateDailyLogRequest:
      type: object
      required:
        - log_date
        - entry
      properties:
        log_date:
          type: string
          format: date
        entry:
          type: string
          maxLength: 10000

    UpdateDailyLogRequest:
      type: object
      required:
        - entry
      properties:
        entry:
          type: string
          maxLength: 10000

    # Shared bulk operation schemas
    BulkDeleteRequest:
      type: object
      required:
        - ids
      properties:
        ids:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: string
            format: uuid
          description: List of IDs to delete (1-100 IDs, duplicates deduplicated server-side)

    BulkDeleteResponse:
      type: object
      properties:
        requested:
          type: integer
          description: Number of unique IDs requested (after deduplication)
        soft_deleted:
          type: integer
          description: Number of items soft deleted (set to inactive)

    BulkPermanentDeleteResponse:
      type: object
      properties:
        requested:
          type: integer
          description: Number of unique IDs requested (after deduplication)
        permanently_deleted:
          type: integer
          description: Number of items permanently deleted

  responses:
    BadRequest:
      description: Bad request
    Unauthorized:
      description: Unauthorized
    NotFound:
      description: Resource not found
