# GoReleaser v2 configuration. Validate with `goreleaser check`.
# Snapshot a local build with `goreleaser release --snapshot --clean`.
# Tagged releases run via .github/workflows/release.yml on `git push --tags`.

version: 2

project_name: go-tasks-api

before:
  hooks:
    - go mod tidy

# Two cross-compiled binaries: the API server and the database migrator.
# The migrator embeds this release's SQL files (see migrations/embed.go) so
# it ships as a single self-contained executable — no external goose install
# or migration mount required at deploy time.
builds:
  - id: api
    main: ./cmd/api
    binary: go-tasks-api
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X go-tasks-api/internal/version.Version={{ .Version }}
      - -X go-tasks-api/internal/version.GitCommit={{ .ShortCommit }}
      - -X go-tasks-api/internal/version.BuildDate={{ .Date }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      # Windows on ARM is rare for server workloads.
      - goos: windows
        goarch: arm64

  - id: migrator
    main: ./cmd/migrate
    binary: go-tasks-database-migrator
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X go-tasks-api/internal/version.Version={{ .Version }}
      - -X go-tasks-api/internal/version.GitCommit={{ .ShortCommit }}
      - -X go-tasks-api/internal/version.BuildDate={{ .Date }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

# Bare binary uploads — no tar/zip wrapping. Each build produces one file per
# (os, arch). GoReleaser appends `.exe` on Windows automatically.
archives:
  - id: api
    ids: [api]
    formats: [binary]
    name_template: "go-tasks-api-{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: migrator
    ids: [migrator]
    formats: [binary]
    name_template: "go-tasks-database-migrator-{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

# SPDX-JSON SBOM per binary, generated by Syft. Uploaded to the release as
# `<binary>.sbom.json` alongside each artifact.
sboms:
  - id: binaries
    artifacts: binary

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^style:'
      - '^ci:'
      - '^build:'
      - 'Merge pull request'
      - 'Merge branch'
  # Group entries by Conventional Commit type. Anything that doesn't match a
  # named group falls into "Other" — useful for spotting commits that slipped
  # through without a conventional prefix.
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: Refactors
      regexp: '^.*?refactor(\(.+\))??!?:.+$'
      order: 3
    - title: Reverts
      regexp: '^.*?revert(\(.+\))??!?:.+$'
      order: 4
    - title: Other
      order: 999

release:
  github:
    owner: sud0x0
    name: go-tasks-api
  draft: false
  prerelease: auto
  header: |
    ## go-tasks-api {{ .Tag }}

    Two binaries are attached below — both static, no runtime dependencies:

    - **`go-tasks-api-{{ .Version }}_<os>_<arch>`** — the API server.
    - **`go-tasks-database-migrator-{{ .Version }}_<os>_<arch>`** — applies this release's schema migrations (embedded into the binary, no external `goose` install needed).

    Available for `linux`, `darwin`, and `windows` on `amd64` + `arm64` (Windows arm64 excluded).
  footer: |
    ## Apply migrations, then run the API

    ```bash
    # Pick the right pair for your platform — example uses linux/amd64.
    chmod +x go-tasks-api-{{ .Version }}_linux_amd64 \
             go-tasks-database-migrator-{{ .Version }}_linux_amd64

    # 1. Apply migrations.
    DATABASE_URL="host=db port=5432 user=$DB_USER password=$DB_PASSWORD dbname=$DB_NAME sslmode=require" \
        ./go-tasks-database-migrator-{{ .Version }}_linux_amd64 up

    # 2. Run the API.
    ./go-tasks-api-{{ .Version }}_linux_amd64
    ```

    Migrator subcommands: `up`, `up-by-one`, `up-to <v>`, `down`, `down-to <v>`, `redo`, `reset`, `status`, `version`. See the [README](https://github.com/sud0x0/go-tasks-api#getting-started) for required environment variables and RSA key provisioning.

    Verify downloads with `sha256sum -c checksums.txt`.
