title = "gitleaks config"

# Extend the default ruleset built into the binary
# Latest default rules: https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
[extend]
useDefault = true

# Global allowlist - paths and patterns to skip
[allowlist]
description = "Global allowlist"
paths = [
    '''go\.(mod|sum)$''',
    '''\.gitleaks\.toml$''',
    '''(?i)\.(jpg|jpeg|png|gif|svg|ico|bmp|tiff)$''',
    '''(?i)\.(pdf|docx?|xlsx?)$''',
    '''vendor/''',
    '''_BUILD_/''',
    '''\.claude/''',
    '''_test_results_/''',
]

# Add project-specific false positives below as needed
# Example:
# [[rules]]
# id = "my-rule"
# description = "Custom rule"
# regex = '''YOUR_REGEX'''
